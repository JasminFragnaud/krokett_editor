name: Rust

on: 
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build_linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build --release
    - name: Cargo Check All Features
      run: cargo check --all-features
    - uses: actions/upload-artifact@v4
      with:
        name: krokett_editor_linux
        path: target/release/krokett_editor_native

  build_windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build --release
    - name: Cargo Check All Features
      run: cargo check --all-features
    - uses: actions/upload-artifact@v4
      with:
        name: krokett_editor_windows
        path: target/release/krokett_editor_native

  wasm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - run: cargo install trunk@0.21.14 --locked
    - name: Build Web
      run: env -C krokett_editor_web trunk build

  android:
    runs-on: ubuntu-latest
    if: false # Android build is currently disabled
    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Setup Java JDK
      uses: actions/setup-java@v4.5.0
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Install Cargo NDK
      run: cargo install cargo-ndk
    - name: Build APK
      working-directory: ./krokett_editor_android
      run: make apk
    - uses: actions/upload-artifact@v4
      with:
        name: krokett_editor-android.apk
        path: krokett_editor_android/java/app/build/outputs/apk/release/app-release-unsigned.apk

  tests-lints:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Tests
      run: cargo test --verbose
    - name: Formatting
      run:  cargo fmt --all --check
    - name: Clippy
      run:  cargo clippy --all-features -- -D warnings 
    - name: Documentation
      run:  cargo doc --no-deps
